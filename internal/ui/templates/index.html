<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABAP Code-Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@400;600&family=Roboto+Condensed:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <style>
    :root {
      --green-dark:   #4fbd57;
      --green-bright: #8de040;
      --green-brand:  #7aab8a;
      --pink-accent:  #e94c74;
      --off-white:    #e7e6e5;
      --soft-black:   #25141d;
      --gray:         #c4cac1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto Condensed', sans-serif;
      background: var(--off-white);
      color: var(--soft-black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }
    h1 {
      font-family: 'Yanone Kaffeesatz', sans-serif;
      font-size: 2.4rem;
      color: var(--green-brand);
      margin-bottom: 2rem;
      letter-spacing: 0.03em;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
    }
    label { font-weight: 500; }
    input[type="text"], input:not([type]) {
      padding: 0.6rem 0.8rem;
      border: 2px solid var(--gray);
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(79,189,87,0.15);
    }
    button[type="submit"] {
      padding: 0.65rem 1.4rem;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'Yanone Kaffeesatz', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: var(--green-brand); }
    button[type="submit"]:active { background: #3a9940; }
    #result { margin-top: 1.5rem; width: 100%; max-width: 420px; }
    #result a { color: var(--green-brand); font-weight: 500; }
  </style>
</head>
<body>
  <h1>ABAP Code-Review</h1>
  <form hx-post="/api/reviews"
        hx-target="#result"
        hx-swap="innerHTML">
    <label for="tr">Transportauftragsnummer</label>
    <input id="tr" name="transport_request_id"
           list="tr-list"
           placeholder="NPLK900014"
           required
           hx-get="/api/transport-requests"
           hx-trigger="load"
           hx-target="#tr-list"
           hx-swap="innerHTML">
    <datalist id="tr-list"></datalist>
    <button type="submit">Review anfordern</button>
  </form>
  <div id="result"></div>
</body>
</html>
