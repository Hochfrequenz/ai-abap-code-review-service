<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABAP Code-Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@400;600&family=Roboto+Condensed:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <style>
    :root {
      --green-dark:   #4fbd57;
      --green-bright: #8de040;
      --green-brand:  #7aab8a;
      --pink-accent:  #e94c74;
      --off-white:    #e7e6e5;
      --soft-black:   #25141d;
      --gray:         #c4cac1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto Condensed', sans-serif;
      background: var(--off-white);
      color: var(--soft-black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }
    h1 {
      font-family: 'Yanone Kaffeesatz', sans-serif;
      font-size: 2.4rem;
      color: var(--green-brand);
      margin-bottom: 2rem;
      letter-spacing: 0.03em;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
    }
    label { font-weight: 500; }
    input[type="text"], input:not([type]) {
      padding: 0.6rem 0.8rem;
      border: 2px solid var(--gray);
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(79,189,87,0.15);
    }
    select {
      padding: 0.6rem 0.8rem;
      border: 2px solid var(--gray);
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      background: #fff;
      cursor: pointer;
    }
    select:focus {
      outline: none;
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(79,189,87,0.15);
    }
    button[type="submit"] {
      padding: 0.65rem 1.4rem;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'Yanone Kaffeesatz', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: var(--green-brand); }
    button[type="submit"]:active { background: #3a9940; }
    #result { margin-top: 1.5rem; width: 100%; max-width: 420px; }
    #result a { color: var(--green-brand); font-weight: 500; }
    .review-ready {
      padding: 1.2rem 1.4rem;
      background: #f0faf1;
      border: 2px solid var(--green-dark);
      border-radius: 6px;
      text-align: center;
    }
    .review-ready__msg { margin-bottom: .75rem; font-size: 1rem; }
    .review-ready__btn {
      display: inline-block;
      padding: .65rem 1.6rem;
      background: var(--green-dark);
      color: #fff;
      border-radius: 4px;
      text-decoration: none;
      font-family: 'Yanone Kaffeesatz', sans-serif;
      font-size: 1.15rem;
      letter-spacing: .04em;
      transition: background .15s;
    }
    .review-ready__btn:hover { background: var(--green-brand); }
    .error {
      padding: 1rem;
      background: #fde8ed;
      border-left: 4px solid var(--pink-accent);
      border-radius: 4px;
      color: #8b1a35;
      font-size: .95rem;
    }
  </style>
</head>
<body>
  <h1>ABAP Code-Review</h1>
  <form hx-post="/api/reviews"
        hx-target="#result"
        hx-swap="innerHTML">
    <label for="tr">Transportauftragsnummer</label>
    <div style="position:relative">
      <input id="tr" name="transport_request_id"
             placeholder="NPLK900014" required
             autocomplete="off">
      <ul id="tr-suggestions" style="
        display:none; position:absolute; left:0; right:0; top:100%;
        background:#fff; border:1px solid var(--gray); border-radius:4px;
        max-height:220px; overflow-y:auto; margin:0; padding:0;
        list-style:none; z-index:10; box-shadow:0 4px 8px rgba(0,0,0,.1);
      "></ul>
    </div>
    <label style="display:flex;align-items:center;gap:.5rem;font-weight:400;font-size:.9rem;color:#555;cursor:pointer">
      <input type="checkbox" id="show-released" style="cursor:pointer">
      Auch freigegebene Transportaufträge anzeigen
    </label>
    <label for="prompt">Rezensions-Stil</label>
    <select id="prompt" name="prompt">
      <option value="review_pedantic" selected>Pedantische Code-Review für erfahrene Entwickler*innen</option>
      <option value="review_appreciative">Wertschätzende Code-Review mit praktischen Tipps für Newbies</option>
      <option value="review_analytical">Technisch-Analytische Code-Review (Selbst-Konsistenz des TA)</option>
      <option value="review_guidelines_hf">Prüfung gegen HF-Entwicklungsrichtlinien</option>
    </select>
    <label for="model">Modell</label>
    <select id="model" name="model">
      <option value="claude-opus-4-8">Opus 4.8 (beste Qualität, &gt;1€/Review)</option>
      <option value="claude-sonnet-4-6" selected>Sonnet 4.6 (~20 Ct/Review, schneller)</option>
      <option value="claude-haiku-4-5-20251001">Haiku 4.5 (~10 Ct/Review, am schnellsten)</option>
    </select>
    <button type="submit">Review anfordern</button>
  </form>
  <div id="result"></div>
  <script>
    // Load TRs in the background; filter client-side as the user types.
    // The checkbox triggers a re-fetch with ?released=true to include released TRs.
    let allTRs = [];

    const input = document.getElementById('tr');
    const list  = document.getElementById('tr-suggestions');

    function loadTRs() {
      const released = document.getElementById('show-released').checked;
      const url = '/api/transport-requests' + (released ? '?released=true' : '');
      fetch(url).then(r => r.json()).then(data => { allTRs = data; showSuggestions(input.value); }).catch(() => {});
    }
    loadTRs();

    function showSuggestions(q) {
      if (!q || !allTRs.length) { list.style.display = 'none'; return; }
      const ql = q.toLowerCase();
      const hits = allTRs.filter(tr =>
        tr.number.toLowerCase().includes(ql) ||
        tr.owner.toLowerCase().includes(ql) ||
        tr.description.toLowerCase().includes(ql)
      ).slice(0, 20);
      if (!hits.length) { list.style.display = 'none'; return; }
      list.innerHTML = '';
      hits.forEach(tr => {
        const li = document.createElement('li');
        li.style.cssText = 'padding:.5rem .75rem;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:.95rem';
        li.onmouseenter = () => li.style.background = 'var(--off-white)';
        li.onmouseleave = () => li.style.background = '';
        const num  = document.createElement('strong');
        const rest = document.createElement('span');
        num.textContent  = tr.number;
        rest.textContent = ' — ' + tr.description + ' (' + tr.owner + ')';
        rest.style.color = '#666';
        li.appendChild(num);
        li.appendChild(rest);
        li.addEventListener('click', () => {
          input.value = tr.number;
          list.style.display = 'none';
        });
        list.appendChild(li);
      });
      list.style.display = 'block';
    }

    input.addEventListener('input',  () => showSuggestions(input.value));
    input.addEventListener('focus',  () => showSuggestions(input.value));
    document.getElementById('show-released').addEventListener('change', loadTRs);
    document.addEventListener('click', e => {
      if (!list.contains(e.target) && e.target !== input) list.style.display = 'none';
    });
  </script>
</body>
</html>
