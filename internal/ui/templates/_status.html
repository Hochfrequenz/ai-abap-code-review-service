{{- if eq .Status "done" -}}
<div class="review-ready">
  <p class="review-ready__msg">✅ Review für <strong>{{.TRID}}</strong> ist fertig!</p>
  <a class="review-ready__btn" href="/reviews/{{.ID}}">Ergebnisse ansehen →</a>
</div>
{{- else if eq .Status "failed" -}}
<div class="error">Review fehlgeschlagen: {{.ErrMsg}}</div>
{{- else if eq .Status "running" -}}
<div hx-get="/api/reviews/{{.ID}}/status"
     hx-trigger="every 3s"
     hx-swap="outerHTML">
  ⚙️ Review läuft für {{.TRID}}…
</div>
{{- else -}}
<div hx-get="/api/reviews/{{.ID}}/status"
     hx-trigger="every 3s"
     hx-swap="outerHTML">
  ⏳ Review wird gestartet für {{.TRID}}…
</div>
{{- end -}}
