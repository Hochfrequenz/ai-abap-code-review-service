{{- if eq .Status "done" -}}
<article class="review">{{.ReviewHTML | safeHTML}}</article>
<button class="print-btn" onclick="window.print()">Drucken / Als PDF speichern</button>
{{- else if eq .Status "failed" -}}
<div class="error">Review fehlgeschlagen: {{.ErrMsg}}</div>
{{- else if eq .Status "running" -}}
<div hx-get="/api/reviews/{{.ID}}/status"
     hx-trigger="every 3s"
     hx-swap="outerHTML">
  ⚙️ Review läuft für {{.TRID}}…
</div>
{{- else -}}
<div hx-get="/api/reviews/{{.ID}}/status"
     hx-trigger="every 3s"
     hx-swap="outerHTML">
  ⏳ Review wird gestartet für {{.TRID}}…
</div>
{{- end -}}
