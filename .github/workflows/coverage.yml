name: coverage
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        if: success()
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Calc coverage
        run: go test ./... -v -covermode=count -coverprofile=coverage.out
      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@v1.2.0
      - name: Enforce Min Coverage
        uses: VeryGoodOpenSource/very_good_coverage@v3.0.0
        with:
          path: "coverage.lcov"
          # Excluded from the gate:
          #   cmd/        — composition root (signal handling, ListenAndServe, os.Exit)
          #   adtclient/  — BTP wiring that requires live credentials; no unit-testable path
          # Remaining untestable gaps: Claude API error paths in internal/agent/runner.go
          # and html/template error paths in internal/ui/templates.go that cannot fire
          # with a correctly-embedded template set. Threshold set to reflect actual
          # achievable coverage (~77%); raise when integration tests are added.
          exclude: "**/cmd/** **/adtclient/**"
          min_coverage: 75
